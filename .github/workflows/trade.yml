name: Borsa Botu

on:
  schedule:
    - cron: '*/5 * * * *' # Her 5 dakikada bir çalışır
  workflow_dispatch: # Manuel çalıştırma butonu

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # v3 yerine v4'e yükselttik (Node 20/24 desteği için)
      - name: Checkout Code
        uses: actions/checkout@v4

      # v4 yerine v5'e yükselttik
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas alpaca-trade-api python-telegram-bot gspread oauth2client

      - name: Run Bot
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
        run: python bot.py
